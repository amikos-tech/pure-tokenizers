name: Reusable Go Security

on:
  workflow_call:
    inputs:
      go-version:
        description: Go version for security checks
        required: false
        type: string
        default: '1.24'

permissions:
  contents: read

jobs:
  go-security:
    name: Go Security Checks
    runs-on: ubuntu-latest
    env:
      GOVULNCHECK_VERSION: v1.1.4
      GOSEC_VERSION: v2.24.0

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}

    - name: Run go vet
      run: go vet ./...

    - name: Install govulncheck
      run: go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"

    - name: Run govulncheck
      run: govulncheck ./...

    - name: Install gosec
      run: go install "github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION}"

    - name: Run gosec
      run: gosec ./...
